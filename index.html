<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="佐野クラブ">
  <meta name="theme-color" content="#0a0e1a">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <title>佐野クラブ Stats</title>
  <link rel="apple-touch-icon" href="icon.png">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }
  </script>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    html,body,#root { height:100%; background:#f5f7fa; }
    body { overscroll-behavior:none; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── 定数 ──────────────────────────────────────────────
const DEFAULT_PLAYERS = [
  { id:1,  uniformNumber:"10", bibsNumber:"6",  name:"阿部 蒼太",   grade:"6年" },
  { id:2,  uniformNumber:"5",  bibsNumber:"28", name:"岩田 圭大郎", grade:"5年" },
  { id:3,  uniformNumber:"6",  bibsNumber:"29", name:"岩田 壮大郎", grade:"5年" },
  { id:4,  uniformNumber:"4",  bibsNumber:"7",  name:"鈴木 奏都",   grade:"5年" },
  { id:5,  uniformNumber:"7",  bibsNumber:"11", name:"渡邊 結仁",   grade:"5年" },
  { id:6,  uniformNumber:"9",  bibsNumber:"14", name:"高橋 立希",   grade:"5年" },
  { id:7,  uniformNumber:"11", bibsNumber:"99", name:"浦野 壱地",   grade:"5年" },
  { id:8,  uniformNumber:"8",  bibsNumber:"2",  name:"渡邊 圭",     grade:"3年" },
  { id:9,  uniformNumber:"12", bibsNumber:"30", name:"阿部 蒼",     grade:"4年" },
];

const EMPTY_STATS = () => ({ fg2m:0,fg2a:0,fg3m:0,fg3a:0,ftm:0,fta:0,orb:0,drb:0,ast:0,stl:0,blk:0,tov:0,pf:0 });
const SCREENS = { SETUP:"SETUP", QUARTER_SELECT:"QUARTER_SELECT", GAME:"GAME", SUMMARY:"SUMMARY", PLAYERS:"PLAYERS", HISTORY:"HISTORY", HISTORY_DETAIL:"HISTORY_DETAIL", SUB:"SUB" };
const QUARTERS = ["1Q","2Q","3Q","4Q","OT"];
const Q_TIME = { "1Q":360,"2Q":360,"3Q":360,"4Q":360,"OT":180 }; // 秒（6分）
const calcPoints = (s) => s.fg2m*2 + s.fg3m*3 + s.ftm;
const pct = (made,att) => att===0 ? "—" : `${Math.round(made/att*100)}%`;
const lsGet = (key,def) => { try { const v=localStorage.getItem(key); return v?JSON.parse(v):def; } catch { return def; } };
const lsSet = (key,val) => { try { localStorage.setItem(key,JSON.stringify(val)); } catch {} };

// ── メインアプリ ──────────────────────────────────────
function App() {
  const [screen, setScreen]           = useState(SCREENS.SETUP);
  const [players, setPlayersRaw]      = useState(() => lsGet("sano_players_v6", DEFAULT_PLAYERS));
  const [gameHistory, setGameHistRaw] = useState(() => lsGet("sano_hist_v6", []));
  const [darkMode, setDarkMode]       = useState(false);
  const [numberMode, setNumberMode]   = useState("uniform");
  const [saveStatus, setSaveStatus]   = useState("");
  const [selectedHistory, setSelectedHistory] = useState(null);

  const showSave = (msg) => { setSaveStatus(msg); setTimeout(()=>setSaveStatus(""),2000); };
  const setPlayers = (upd) => setPlayersRaw(prev => {
    const next = typeof upd==="function" ? upd(prev) : upd;
    lsSet("sano_players_v6", next); showSave("選手データ保存済み ✓"); return next;
  });
  const setGameHistory = (upd) => setGameHistRaw(prev => {
    const next = typeof upd==="function" ? upd(prev) : upd;
    lsSet("sano_hist_v6", next); showSave("試合履歴保存済み ✓"); return next;
  });

  const getNum = useCallback((p) =>
    numberMode==="bibs" ? (p.bibsNumber||p.uniformNumber) : (p.uniformNumber||p.bibsNumber)
  ,[numberMode]);

  // ── 試合状態 ──
  const [gameInfo, setGameInfo]           = useState({ opponent:"", date:new Date().toISOString().slice(0,10), tournament:"", venue:"", category:"ミニバス男子" });
  const [quarter, setQuarter]             = useState("1Q");
  const [stats, setStats]                 = useState({});
  const [oppStats, setOppStats]           = useState({ fg2m:0,fg3m:0,ftm:0,tov:0 });
  const [log, setLog]                     = useState([]);
  const [undoHistory, setUndoHistory]     = useState([]);
  const [roster, setRoster]               = useState([]);         // 試合登録全員
  const [courtPlayers, setCourtPlayers]   = useState([]);         // 現在コートの5人
  const [activePlayer, setActivePlayer]   = useState(null);
  const [quarterTimer, setQuarterTimer]   = useState(360);        // 残り秒（6:00から）
  const [timerRunning, setTimerRunning]   = useState(false);
  const [quarterScores, setQuarterScores] = useState({});
  const [feedback, setFeedback]           = useState("");
  const [subMode, setSubMode]             = useState(null);       // {out:id} or null
  const timerRef = useRef(null);

  useEffect(() => {
    if (timerRunning) timerRef.current = setInterval(()=>setQuarterTimer(t=>t>0?t-1:0),1000);
    else clearInterval(timerRef.current);
    return () => clearInterval(timerRef.current);
  },[timerRunning]);

  // タイマーが0になったら自動停止
  useEffect(() => { if (quarterTimer===0) setTimerRunning(false); },[quarterTimer]);

  const fmtTime = (s) => `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
  const teamScore = Object.values(stats).reduce((sum,s)=>sum+calcPoints(s),0);
  const oppScore  = oppStats.fg2m*2 + oppStats.fg3m*3 + oppStats.ftm;

  // ── 試合開始 ──
  const startGame = () => {
    const init={};
    roster.forEach(id=>{init[id]=EMPTY_STATS();});
    setStats(init); setOppStats({fg2m:0,fg3m:0,ftm:0,tov:0});
    setLog([]); setUndoHistory([]); setQuarter("1Q");
    setQuarterTimer(Q_TIME["1Q"]); setTimerRunning(false);
    setQuarterScores({}); setActivePlayer(null); setCourtPlayers([]);
    setScreen(SCREENS.QUARTER_SELECT);
  };

  // ── フィードバック ──
  const showFeedback = useCallback((msg) => {
    setFeedback(msg); setTimeout(()=>setFeedback(""),1200);
  },[]);

  // ── プレイ記録 ──
  const recordPlay = useCallback((playerId, action, label) => {
    if (!playerId && action!=="opp") return;
    setUndoHistory(h=>[...h.slice(-30),{stats:JSON.parse(JSON.stringify(stats)),oppStats:{...oppStats},log:[...log]}]);
    const ts = fmtTime(quarterTimer);
    if (action==="opp") {
      const {key,delta}=label;
      setOppStats(prev=>({...prev,[key]:prev[key]+delta}));
      setLog(prev=>[...prev,{q:quarter,time:ts,text:`相手 ${label.label}`,type:"opp"}]);
      showFeedback(`相手 ${label.label}`); return;
    }
    const player=players.find(p=>p.id===playerId);
    const num=player?getNum(player):"?";
    const name=player?`#${num} ${player.name}`:"?";
    setStats(prev=>{const s={...prev[playerId]};action(s);return{...prev,[playerId]:s};});
    setLog(prev=>[...prev,{q:quarter,time:ts,text:`${name} ${label}`,type:"team"}]);
    showFeedback(`${name} ${label}`);
  },[stats,oppStats,log,quarter,quarterTimer,players,getNum,showFeedback]);

  // ── Undo ──
  const undo = () => {
    if (undoHistory.length===0) return;
    const prev=undoHistory[undoHistory.length-1];
    setStats(prev.stats); setOppStats(prev.oppStats); setLog(prev.log);
    setUndoHistory(h=>h.slice(0,-1)); showFeedback("↩ 取り消しました");
  };

  // ── Q切替 → Q選択画面へ ──
  const goNextQuarter = () => {
    setTimerRunning(false);
    setQuarterScores(prev=>({...prev,[quarter]:{team:teamScore,opp:oppScore}}));
    const idx=QUARTERS.indexOf(quarter);
    if (idx<QUARTERS.length-1) {
      const next=QUARTERS[idx+1];
      setQuarter(next);
      setQuarterTimer(Q_TIME[next]||180);
      setCourtPlayers([]);
      setActivePlayer(null);
      setScreen(SCREENS.QUARTER_SELECT);
    }
  };

  // ── 試合終了 ──
  const endGame = () => {
    setTimerRunning(false);
    const finalScores={...quarterScores,[quarter]:{team:teamScore,opp:oppScore}};
    setQuarterScores(finalScores);
    const allPlayers=roster.map(id=>players.find(p=>p.id===id)).filter(Boolean);
    const gameData={
      id:Date.now(), info:{...gameInfo,numberMode},
      stats:JSON.parse(JSON.stringify(stats)),
      oppStats:{...oppStats}, log:[...log],
      quarterScores:finalScores,
      players:allPlayers,
      teamScore, oppScore,
      numberMode,
    };
    setGameHistory(prev=>[gameData,...prev.slice(0,19)]);
    setScreen(SCREENS.SUMMARY);
  };

  // ── カラー ──
  const C = darkMode ? {
    bg:"#0a0e1a",card:"#111827",card2:"#1a2235",border:"#1e3a5f",
    text:"#e8f0fe",sub:"#7b9cca",accent:"#f59e0b",green:"#22c55e",
    red:"#ef4444",blue:"#3b82f6",opp:"#64748b",bibs:"#a78bfa",uniform:"#38bdf8",
    scoreBg:"#0d2b0d", scoreText:"#ffffff",
    btnShoot:"#166534", btnShootText:"#ffffff",
    btnReb:"#1e3a8a",  btnRebText:"#ffffff",
    btnOther:"#4c1d95",btnOtherText:"#ffffff",
    btnMiss:"#7f1d1d",  btnMissText:"#ffffff",
  } : {
    bg:"#f5f7fa",card:"#ffffff",card2:"#eef2f7",border:"#cbd5e1",
    text:"#0f172a",sub:"#475569",accent:"#d97706",green:"#15803d",
    red:"#dc2626",blue:"#1d4ed8",opp:"#64748b",bibs:"#7c3aed",uniform:"#0369a1",
    scoreBg:"#ffffff", scoreText:"#0f172a",
    btnShoot:"#15803d", btnShootText:"#ffffff",
    btnReb:"#1d4ed8",   btnRebText:"#ffffff",
    btnOther:"#6d28d9",  btnOtherText:"#ffffff",
    btnMiss:"#b91c1c",   btnMissText:"#ffffff",
  };

  const css=`
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;600;700;900&display=swap');
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{background:${C.bg};font-family:'Noto Sans JP',sans-serif;color:${C.text};}
    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:${C.border};border-radius:2px}
    .bebas{font-family:'Bebas Neue',sans-serif;letter-spacing:.05em}
    button{cursor:pointer;border:none;outline:none;font-family:'Noto Sans JP',sans-serif;}
    input,select{font-family:'Noto Sans JP',sans-serif;}
  `;

  const modeColor = numberMode==="bibs" ? C.bibs : C.uniform;

  // ════════════════════════════════════════
  // 選手管理画面
  // ════════════════════════════════════════
  if (screen===SCREENS.PLAYERS) return (
    <div style={{background:C.bg,minHeight:"100vh",padding:16}}>
      <style>{css}</style>
      {saveStatus&&<div style={{position:"fixed",top:12,right:12,background:C.green,color:"#fff",padding:"6px 14px",borderRadius:20,fontSize:12,fontWeight:700,zIndex:999}}>{saveStatus}</div>}
      <div style={{maxWidth:480,margin:"0 auto"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
          <button onClick={()=>setScreen(SCREENS.SETUP)} style={{background:C.card,color:C.text,padding:"8px 14px",borderRadius:8,fontSize:14,border:`1px solid ${C.border}`}}>← 戻る</button>
          <h2 style={{fontSize:20,fontWeight:900}}>選手登録</h2>
          <div style={{marginLeft:"auto",fontSize:11,color:C.green}}>💾 自動保存</div>
        </div>
        <div style={{background:C.card,borderRadius:12,padding:"10px 14px",marginBottom:12,border:`1px solid ${C.border}`,display:"flex",gap:16}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:12,height:12,borderRadius:3,background:C.uniform}}/><span style={{fontSize:12,color:C.sub}}>ユニフォーム番号</span></div>
          <div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:12,height:12,borderRadius:3,background:C.bibs}}/><span style={{fontSize:12,color:C.sub}}>ビブス番号</span></div>
        </div>
        {players.map((p,i)=>(
          <div key={p.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"12px 14px",marginBottom:8}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
              <div style={{display:"flex",gap:4}}>
                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:9,color:C.uniform,fontWeight:700,marginBottom:2}}>UNI</div>
                  <div className="bebas" style={{fontSize:26,color:C.uniform,lineHeight:1,minWidth:32,textAlign:"center"}}>{p.uniformNumber||"—"}</div>
                </div>
                <div style={{fontSize:16,color:C.sub,alignSelf:"center",padding:"0 2px"}}>/</div>
                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:9,color:C.bibs,fontWeight:700,marginBottom:2}}>BIBS</div>
                  <div className="bebas" style={{fontSize:26,color:C.bibs,lineHeight:1,minWidth:32,textAlign:"center"}}>{p.bibsNumber||"—"}</div>
                </div>
              </div>
              <div style={{flex:1}}><input value={p.name} onChange={e=>setPlayers(prev=>prev.map((x,j)=>j===i?{...x,name:e.target.value}:x))} placeholder="名前" style={{width:"100%",background:C.card2,border:`1px solid ${C.border}`,borderRadius:6,padding:"7px 10px",color:C.text,fontSize:15,fontWeight:700}}/></div>
              <select value={p.grade} onChange={e=>setPlayers(prev=>prev.map((x,j)=>j===i?{...x,grade:e.target.value}:x))} style={{background:C.card2,border:`1px solid ${C.border}`,borderRadius:6,padding:"7px 6px",color:C.text,fontSize:13}}>
                {["6年","5年","4年","3年","2年","1年"].map(g=><option key={g}>{g}</option>)}
              </select>
              <button onClick={()=>setPlayers(prev=>prev.filter((_,j)=>j!==i))} style={{background:"none",color:C.red,fontSize:20,padding:"4px 6px"}}>×</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <div>
                <label style={{fontSize:10,color:C.uniform,fontWeight:700,display:"block",marginBottom:3}}>🏅 ユニフォーム番号</label>
                <input value={p.uniformNumber||""} onChange={e=>setPlayers(prev=>prev.map((x,j)=>j===i?{...x,uniformNumber:e.target.value}:x))} placeholder="例：5" style={{width:"100%",background:C.card2,border:`2px solid ${C.uniform}44`,borderRadius:6,padding:"7px 10px",color:C.text,fontSize:16,fontWeight:700,textAlign:"center"}}/>
              </div>
              <div>
                <label style={{fontSize:10,color:C.bibs,fontWeight:700,display:"block",marginBottom:3}}>🎽 ビブス番号</label>
                <input value={p.bibsNumber||""} onChange={e=>setPlayers(prev=>prev.map((x,j)=>j===i?{...x,bibsNumber:e.target.value}:x))} placeholder="例：2" style={{width:"100%",background:C.card2,border:`2px solid ${C.bibs}44`,borderRadius:6,padding:"7px 10px",color:C.text,fontSize:16,fontWeight:700,textAlign:"center"}}/>
              </div>
            </div>
          </div>
        ))}
        <button onClick={()=>setPlayers(prev=>[...prev,{id:Date.now(),uniformNumber:"",bibsNumber:"",name:"",grade:"6年"}])} style={{width:"100%",background:C.accent,color:"#000",padding:12,borderRadius:10,fontWeight:700,fontSize:15,marginTop:8}}>＋ 選手を追加</button>
      </div>
    </div>
  );

  // ════════════════════════════════════════
  // セットアップ画面
  // ════════════════════════════════════════
  if (screen===SCREENS.SETUP) return (
    <div style={{background:C.bg,minHeight:"100vh",padding:16}}>
      <style>{css}</style>
      {saveStatus&&<div style={{position:"fixed",top:12,right:12,background:C.green,color:"#fff",padding:"6px 14px",borderRadius:20,fontSize:12,fontWeight:700,zIndex:999}}>{saveStatus}</div>}
      <div style={{maxWidth:500,margin:"0 auto"}}>
        <div style={{textAlign:"center",padding:"20px 0 16px"}}>
          <div className="bebas" style={{fontSize:11,color:C.accent,letterSpacing:4,marginBottom:4}}>SANO CLUB BOYS</div>
          <div className="bebas" style={{fontSize:38,color:C.text,lineHeight:1}}>STATS APP</div>
          <div style={{display:"flex",justifyContent:"center",gap:8,marginTop:10}}>
            <button onClick={()=>setDarkMode(d=>!d)} style={{background:C.card,color:C.sub,padding:"5px 14px",borderRadius:20,fontSize:12,border:`1px solid ${C.border}`}}>{darkMode?"☀️ ライト":"🌙 ダーク"}</button>
            <button onClick={()=>setScreen(SCREENS.HISTORY)} style={{background:C.card,color:C.sub,padding:"5px 14px",borderRadius:20,fontSize:12,border:`1px solid ${C.border}`}}>📋 試合履歴</button>
          </div>
        </div>

        {/* 試合情報 */}
        <div style={{background:C.card,borderRadius:16,padding:16,marginBottom:12,border:`1px solid ${C.border}`}}>
          <div style={{fontSize:11,color:C.accent,fontWeight:700,letterSpacing:2,marginBottom:12}}>GAME INFO</div>
          {[["対戦相手","opponent","text","例：板橋クラブ"],["日付","date","date",""],["大会名","tournament","text","例：区長杯"],["会場","venue","text","例：○○体育館"]].map(([label,key,type,ph])=>(
            <div key={key} style={{marginBottom:10}}>
              <label style={{fontSize:12,color:C.sub,display:"block",marginBottom:4}}>{label}</label>
              <input type={type} value={gameInfo[key]} placeholder={ph} onChange={e=>setGameInfo(prev=>({...prev,[key]:e.target.value}))} style={{width:"100%",background:C.card2,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 12px",color:C.text,fontSize:15}}/>
            </div>
          ))}
          <div>
            <label style={{fontSize:12,color:C.sub,display:"block",marginBottom:4}}>学年カテゴリ</label>
            <select value={gameInfo.category} onChange={e=>setGameInfo(prev=>({...prev,category:e.target.value}))} style={{width:"100%",background:C.card2,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 12px",color:C.text,fontSize:15}}>
              {["ミニバス男子","6年","5年","4年","混合"].map(c=><option key={c}>{c}</option>)}
            </select>
          </div>
        </div>

        {/* 番号モード */}
        <div style={{background:C.card,borderRadius:16,padding:16,marginBottom:12,border:`1px solid ${C.border}`}}>
          <div style={{fontSize:11,color:C.accent,fontWeight:700,letterSpacing:2,marginBottom:12}}>NUMBER MODE</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <button onClick={()=>setNumberMode("uniform")} style={{background:numberMode==="uniform"?C.uniform+"22":C.card2,border:`2px solid ${numberMode==="uniform"?C.uniform:C.border}`,borderRadius:10,padding:"12px 8px",transition:"all .15s"}}>
              <div style={{fontSize:20,marginBottom:4}}>🏅</div>
              <div style={{fontSize:13,fontWeight:700,color:numberMode==="uniform"?C.uniform:C.sub}}>ユニフォーム番号</div>
              <div style={{fontSize:10,color:C.sub,marginTop:2}}>大会・公式戦</div>
            </button>
            <button onClick={()=>setNumberMode("bibs")} style={{background:numberMode==="bibs"?C.bibs+"22":C.card2,border:`2px solid ${numberMode==="bibs"?C.bibs:C.border}`,borderRadius:10,padding:"12px 8px",transition:"all .15s"}}>
              <div style={{fontSize:20,marginBottom:4}}>🎽</div>
              <div style={{fontSize:13,fontWeight:700,color:numberMode==="bibs"?C.bibs:C.sub}}>ビブス番号</div>
              <div style={{fontSize:10,color:C.sub,marginTop:2}}>練習試合・紅白戦</div>
            </button>
          </div>
        </div>

        {/* ロスター */}
        <div style={{background:C.card,borderRadius:16,padding:16,marginBottom:12,border:`1px solid ${C.border}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontSize:11,color:C.accent,fontWeight:700,letterSpacing:2}}>ROSTER（登録選手）</div>
            <button onClick={()=>setScreen(SCREENS.PLAYERS)} style={{background:C.card2,color:C.sub,padding:"5px 12px",borderRadius:6,fontSize:12,border:`1px solid ${C.border}`}}>選手編集</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            {players.map(p=>{
              const on=roster.includes(p.id);
              const activeNum=getNum(p);
              const inactiveNum=numberMode==="bibs"?(p.uniformNumber||"—"):(p.bibsNumber||"—");
              const inactiveLabel=numberMode==="bibs"?"UNI":"BIBS";
              const inactiveColor=numberMode==="bibs"?C.uniform:C.bibs;
              return (
                <button key={p.id} onClick={()=>setRoster(prev=>on?prev.filter(id=>id!==p.id):[...prev,p.id])}
                  style={{background:on?modeColor+"22":C.card2,border:`2px solid ${on?modeColor:C.border}`,borderRadius:10,padding:"10px 12px",display:"flex",flexDirection:"column",gap:4,transition:"all .15s",textAlign:"left",position:"relative"}}>
                  <div style={{display:"flex",alignItems:"baseline",gap:4}}>
                    <span className="bebas" style={{fontSize:26,color:on?modeColor:C.sub,lineHeight:1}}>#{activeNum}</span>
                    <span style={{fontSize:13,fontWeight:700,color:on?C.text:C.sub}}>{p.name}</span>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:4}}>
                    <span style={{fontSize:9,color:inactiveColor,fontWeight:700,background:inactiveColor+"18",padding:"1px 5px",borderRadius:3}}>{inactiveLabel}</span>
                    <span style={{fontSize:11,color:C.sub}}>#{inactiveNum}</span>
                    <span style={{fontSize:10,color:C.sub,marginLeft:2}}>{p.grade}</span>
                  </div>
                  {on&&<span style={{position:"absolute",top:8,right:10,fontSize:14,color:modeColor}}>✓</span>}
                </button>
              );
            })}
          </div>
          <div style={{marginTop:10,fontSize:12,color:C.sub,textAlign:"center"}}>{roster.length}人登録中</div>
        </div>

        {/* 試合履歴プレビュー */}
        {gameHistory.length>0&&(
          <div style={{background:C.card,borderRadius:16,padding:16,marginBottom:12,border:`1px solid ${C.border}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={{fontSize:11,color:C.accent,fontWeight:700,letterSpacing:2}}>RECENT GAMES</div>
              <button onClick={()=>setScreen(SCREENS.HISTORY)} style={{fontSize:12,color:C.blue,background:"none"}}>すべて見る →</button>
            </div>
            {gameHistory.slice(0,3).map(g=>(
              <button key={g.id} onClick={()=>{setSelectedHistory(g);setScreen(SCREENS.HISTORY_DETAIL);}}
                style={{width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:`1px solid ${C.border}`,background:"none",textAlign:"left"}}>
                <div>
                  <div style={{fontSize:13,fontWeight:700,color:C.text}}>vs {g.info.opponent||"不明"}</div>
                  <div style={{fontSize:11,color:C.sub}}>{g.info.date} {g.info.tournament}</div>
                </div>
                <div className="bebas" style={{fontSize:22,color:g.teamScore>g.oppScore?C.green:g.teamScore<g.oppScore?C.red:C.sub}}>{g.teamScore} - {g.oppScore}</div>
              </button>
            ))}
          </div>
        )}

        <button onClick={startGame} disabled={roster.length===0}
          style={{width:"100%",background:roster.length>0?C.accent:C.border,color:roster.length>0?"#000":C.sub,padding:16,borderRadius:12,fontWeight:900,fontSize:18,marginBottom:24,transition:"all .2s"}}>
          🏀 試合開始
        </button>
      </div>
    </div>
  );

  // ════════════════════════════════════════
  // Qメンバー選択画面
  // ════════════════════════════════════════
  if (screen===SCREENS.QUARTER_SELECT) {
    const rosterPlayers = roster.map(id=>players.find(p=>p.id===id)).filter(Boolean);
    return (
      <div style={{background:C.bg,minHeight:"100vh",padding:16}}>
        <style>{css}</style>
        <div style={{maxWidth:500,margin:"0 auto"}}>
          <div style={{textAlign:"center",padding:"20px 0 16px"}}>
            <div className="bebas" style={{fontSize:48,color:C.accent}}>{quarter}</div>
            <div style={{fontSize:16,fontWeight:700,color:C.text,marginBottom:4}}>コートに出る5人を選択</div>
            <div style={{fontSize:13,color:C.sub}}>選択中: {courtPlayers.length}人 / 5人</div>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
            {rosterPlayers.map(p=>{
              const on=courtPlayers.includes(p.id);
              const pts=stats[p.id]?calcPoints(stats[p.id]):0;
              const pf=stats[p.id]?.pf||0;
              return (
                <button key={p.id}
                  onClick={()=>{
                    if(on) setCourtPlayers(prev=>prev.filter(id=>id!==p.id));
                    else if(courtPlayers.length<5) setCourtPlayers(prev=>[...prev,p.id]);
                  }}
                  style={{background:on?modeColor+"22":C.card,border:`2px solid ${on?modeColor:C.border}`,borderRadius:12,padding:"14px 12px",display:"flex",alignItems:"center",gap:12,transition:"all .12s",opacity:pf>=5?0.5:1}}>
                  <div className="bebas" style={{fontSize:32,color:on?modeColor:C.sub,minWidth:44,textAlign:"center"}}>#{getNum(p)}</div>
                  <div style={{textAlign:"left"}}>
                    <div style={{fontSize:15,fontWeight:700,color:on?C.text:C.sub}}>{p.name}</div>
                    <div style={{fontSize:11,color:C.sub}}>{p.grade}</div>
                    <div style={{fontSize:11,color:pts>0?C.accent:C.sub}}>{pts}pts {pf>=4?`⚠️F${pf}`:""}</div>
                  </div>
                  {on&&<span style={{marginLeft:"auto",fontSize:20,color:modeColor}}>✓</span>}
                </button>
              );
            })}
          </div>

          <button onClick={()=>{setScreen(SCREENS.GAME);}}
            disabled={courtPlayers.length===0}
            style={{width:"100%",background:courtPlayers.length>0?C.accent:C.border,color:courtPlayers.length>0?"#000":C.sub,padding:16,borderRadius:12,fontWeight:900,fontSize:18,marginBottom:12}}>
            {courtPlayers.length>0?`${courtPlayers.length}人でゲーム開始 →`:"選手を選んでください"}
          </button>
          {quarter!=="1Q"&&(
            <button onClick={()=>setScreen(SCREENS.GAME)} style={{width:"100%",background:"none",border:`1px solid ${C.border}`,color:C.sub,padding:12,borderRadius:10,fontSize:14}}>← そのまま試合に戻る</button>
          )}
        </div>
      </div>
    );
  }

  // ════════════════════════════════════════
  // 試合中メイン画面
  // ════════════════════════════════════════
  if (screen===SCREENS.GAME) {
    const activePl=players.find(p=>p.id===activePlayer);
    const timerPct=(quarterTimer/(Q_TIME[quarter]||360))*100;
    const timerColor=quarterTimer<=30?C.red:quarterTimer<=60?C.accent:C.green;

    const playGroups=[
      {label:"🏀 シュート", actions:[
        {label:"2P ○",bg:C.btnShoot,  tc:C.btnShootText, fn:s=>{s.fg2m++;s.fg2a++;}},
        {label:"2P ×",bg:C.btnMiss,   tc:C.btnMissText,  fn:s=>{s.fg2a++;}},
        {label:"3P ○",bg:C.btnShoot,  tc:C.btnShootText, fn:s=>{s.fg3m++;s.fg3a++;}},
        {label:"3P ×",bg:C.btnMiss,   tc:C.btnMissText,  fn:s=>{s.fg3a++;}},
        {label:"FT ○",bg:C.btnShoot,  tc:C.btnShootText, fn:s=>{s.ftm++;s.fta++;}},
        {label:"FT ×",bg:C.btnMiss,   tc:C.btnMissText,  fn:s=>{s.fta++;}},
      ]},
      {label:"📦 リバウンド", actions:[
        {label:"OR",bg:C.btnReb,  tc:C.btnRebText,  fn:s=>{s.orb++;}},
        {label:"DR",bg:C.btnReb,  tc:C.btnRebText,  fn:s=>{s.drb++;}},
      ]},
      {label:"✨ その他", actions:[
        {label:"AS",  bg:C.btnOther,tc:C.btnOtherText,fn:s=>{s.ast++;}},
        {label:"ST",  bg:C.btnOther,tc:C.btnOtherText,fn:s=>{s.stl++;}},
        {label:"BLK", bg:C.btnOther,tc:C.btnOtherText,fn:s=>{s.blk++;}},
        {label:"TO",  bg:C.btnMiss, tc:C.btnMissText, fn:s=>{s.tov++;}},
        {label:"F",   bg:C.btnMiss, tc:C.btnMissText, fn:s=>{s.pf++;}},
      ]},
    ];

    const oppActions=[
      {label:"2P○",key:"fg2m",delta:1},
      {label:"3P○",key:"fg3m",delta:1},
      {label:"FT○",key:"ftm", delta:1},
      {label:"TO", key:"tov", delta:1},
    ];

    return (
      <div style={{background:C.bg,minHeight:"100vh",display:"flex",flexDirection:"column"}}>
        <style>{css}</style>

        {feedback&&(
          <div style={{position:"fixed",top:56,left:"50%",transform:"translateX(-50%)",background:C.accent,color:"#000",padding:"8px 20px",borderRadius:20,fontWeight:700,fontSize:14,zIndex:999,pointerEvents:"none",boxShadow:"0 4px 20px #0008"}}>
            {feedback}
          </div>
        )}

        {/* スコアバー */}
        <div style={{background:C.card,borderBottom:`3px solid ${C.accent}`,padding:"10px 12px 6px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:4}}>
            {/* 佐野クラブ得点 */}
            <div style={{flex:1,textAlign:"center",background:C.green+"15",borderRadius:12,padding:"8px 4px"}}>
              <div style={{fontSize:11,color:C.green,fontWeight:900,letterSpacing:1}}>佐野クラブ</div>
              <div className="bebas" style={{fontSize:72,color:C.green,lineHeight:1}}>{teamScore}</div>
            </div>
            {/* 中央：Q・タイマー */}
            <div style={{textAlign:"center",minWidth:110}}>
              <div className="bebas" style={{fontSize:26,color:C.accent,lineHeight:1}}>{quarter}</div>
              <div style={{margin:"3px 0"}}>
                <div style={{fontSize:26,fontWeight:900,color:timerColor,fontFamily:"monospace",letterSpacing:2}}>{fmtTime(quarterTimer)}</div>
                <div style={{height:5,background:C.border,borderRadius:3,marginTop:3}}>
                  <div style={{height:"100%",background:timerColor,borderRadius:3,width:`${timerPct}%`,transition:"width .5s"}}/>
                </div>
              </div>
              <button onClick={()=>setTimerRunning(t=>!t)}
                style={{background:timerRunning?C.red:C.green,border:"none",borderRadius:8,padding:"5px 14px",fontSize:13,color:"#fff",fontWeight:700,marginTop:3}}>
                {timerRunning?"⏸ 停止":"▶ 開始"}
              </button>
            </div>
            {/* 相手得点 */}
            <div style={{flex:1,textAlign:"center",background:C.red+"15",borderRadius:12,padding:"8px 4px"}}>
              <div style={{fontSize:11,color:C.red,fontWeight:900,letterSpacing:1}}>{gameInfo.opponent||"相手"}</div>
              <div className="bebas" style={{fontSize:72,color:C.red,lineHeight:1}}>{oppScore}</div>
            </div>
          </div>
          {/* Qタブ */}
          <div style={{display:"flex",gap:4,justifyContent:"center",marginTop:6}}>
            {QUARTERS.map(q=>{
              const qs=quarterScores[q]; const active=q===quarter;
              return (
                <button key={q} onClick={()=>{
                  if(q!==quarter){
                    setTimerRunning(false);
                    setQuarterScores(prev=>({...prev,[quarter]:{team:teamScore,opp:oppScore}}));
                    setQuarter(q);
                    setQuarterTimer(Q_TIME[q]||180);
                  }
                }} style={{background:active?C.accent:C.card2,border:`1px solid ${active?C.accent:C.border}`,borderRadius:6,padding:"4px 10px",fontSize:12,color:active?"#fff":C.sub,fontWeight:active?700:400}}>
                  {q}{qs?` ${qs.team}-${qs.opp}`:""}
                </button>
              );
            })}
          </div>
        </div>

        {/* コート選手ボタン */}
        <div style={{padding:"8px 10px 4px",background:C.card2}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
            <div style={{fontSize:10,color:modeColor,fontWeight:700}}>コート ({courtPlayers.length}人)</div>
            <button onClick={()=>setScreen(SCREENS.QUARTER_SELECT)} style={{fontSize:11,color:C.sub,background:"none",padding:"2px 8px",border:`1px solid ${C.border}`,borderRadius:6}}>🔄 交代</button>
          </div>
          <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:4}}>
            {courtPlayers.map(id=>{
              const p=players.find(x=>x.id===id); if(!p) return null;
              const on=activePlayer===id;
              const pts=stats[id]?calcPoints(stats[id]):0;
              const pf=stats[id]?.pf||0;
              return (
                <button key={id} onClick={()=>setActivePlayer(on?null:id)}
                  style={{flex:"none",background:on?modeColor:C.card,border:`2px solid ${on?modeColor:C.border}`,borderRadius:12,padding:"8px 10px",minWidth:60,textAlign:"center",transition:"all .12s",position:"relative"}}>
                  <div className="bebas" style={{fontSize:22,color:on?"#000":C.text}}>#{getNum(p)}</div>
                  <div style={{fontSize:11,color:on?"#000":C.sub,fontWeight:600}}>{p.name}</div>
                  <div style={{fontSize:10,color:on?"#0008":C.accent,fontWeight:700}}>{pts}pts</div>
                  {pf>=4&&<div style={{position:"absolute",top:2,right:4,fontSize:9,color:C.red,fontWeight:700}}>F{pf}</div>}
                </button>
              );
            })}
          </div>
        </div>

        {/* プレイボタン */}
        <div style={{flex:1,overflow:"auto",padding:"8px 10px"}}>
          {activePlayer?(
            <div>
              <div style={{fontSize:11,color:modeColor,fontWeight:700,marginBottom:8}}>#{getNum(activePl)} {activePl?.name} にプレイを記録</div>
              {playGroups.map(group=>(
                <div key={group.label} style={{marginBottom:10}}>
                  <div style={{fontSize:12,color:C.sub,fontWeight:700,marginBottom:6}}>{group.label}</div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:7}}>
                    {group.actions.map(action=>(
                      <button key={action.label} onClick={()=>recordPlay(activePlayer,action.fn,action.label)}
                        style={{background:action.bg,border:"none",borderRadius:10,padding:"16px 6px",fontWeight:900,fontSize:17,color:action.tc,boxShadow:"0 2px 6px #0002"}}
                        onTouchStart={e=>e.currentTarget.style.opacity="0.7"}
                        onTouchEnd={e=>e.currentTarget.style.opacity="1"}>
                        {action.label}
                      </button>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          ):(
            <div style={{textAlign:"center",padding:"24px 16px",color:C.sub}}>
              <div style={{fontSize:36,marginBottom:8}}>👆</div>
              <div style={{fontSize:14,fontWeight:700}}>上の選手ボタンを選択してください</div>
            </div>
          )}

          {/* 相手チーム */}
          <div style={{background:C.card,borderRadius:12,padding:10,marginTop:4,border:`1px solid ${C.border}`}}>
            <div style={{fontSize:11,color:C.sub,marginBottom:6}}>相手チーム入力</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
              {oppActions.map(a=>(
                <button key={a.key} onClick={()=>recordPlay(null,"opp",a)}
                  style={{background:C.opp+"22",border:`1px solid ${C.opp}55`,borderRadius:8,padding:"12px 4px",fontWeight:700,fontSize:14,color:C.opp}}>
                  {a.label}
                </button>
              ))}
            </div>
          </div>

          {/* ログ */}
          <div style={{background:C.card,borderRadius:12,padding:10,marginTop:8,border:`1px solid ${C.border}`}}>
            <div style={{fontSize:11,color:C.sub,marginBottom:6,display:"flex",justifyContent:"space-between"}}>
              <span>プレイログ</span><span>{log.length}件</span>
            </div>
            <div style={{maxHeight:140,overflow:"auto",display:"flex",flexDirection:"column-reverse"}}>
              {[...log].reverse().map((entry,i)=>(
                <div key={i} style={{display:"flex",gap:8,padding:"4px 0",borderBottom:`1px solid ${C.border}`,fontSize:13}}>
                  <span style={{color:C.accent,fontWeight:700,whiteSpace:"nowrap",minWidth:24}}>{entry.q}</span>
                  <span style={{color:C.sub,whiteSpace:"nowrap",minWidth:42}}>{entry.time}</span>
                  <span style={{color:entry.type==="opp"?C.red:C.text}}>{entry.text}</span>
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* ボトムバー */}
        <div style={{background:C.card,borderTop:`1px solid ${C.border}`,padding:"8px 10px",display:"flex",gap:6}}>
          <button onClick={undo} disabled={undoHistory.length===0}
            style={{flex:1,background:undoHistory.length>0?C.card2:C.border+"44",border:`1px solid ${C.border}`,borderRadius:10,padding:10,fontSize:13,fontWeight:700,color:undoHistory.length>0?C.text:C.sub}}>↩ Undo</button>
          <button onClick={goNextQuarter}
            style={{flex:1.5,background:C.blue+"22",border:`1px solid ${C.blue}`,borderRadius:10,padding:10,fontSize:13,fontWeight:700,color:C.blue}}>次のQ →</button>
          <button onClick={endGame}
            style={{flex:2,background:C.accent,border:"none",borderRadius:10,padding:10,fontSize:13,fontWeight:900,color:"#000"}}>試合終了</button>
        </div>
      </div>
    );
  }

  // ════════════════════════════════════════
  // サマリー画面（共通コンポーネント）
  // ════════════════════════════════════════
  const SummaryView = ({gameData, onBack}) => {
    const gPlayers = gameData.players || [];
    const gStats   = gameData.stats  || {};
    const gOpp     = gameData.oppStats|| {};
    const gLog     = gameData.log    || [];
    const gInfo    = gameData.info   || {};
    const gQS      = gameData.quarterScores || {};
    const gNMode   = gameData.numberMode || "uniform";
    const gGetNum  = (p) => gNMode==="bibs"?(p.bibsNumber||p.uniformNumber):(p.uniformNumber||p.bibsNumber);
    const gMC      = gNMode==="bibs"?C.bibs:C.uniform;
    const tScore   = gameData.teamScore || 0;
    const oScore   = gameData.oppScore  || 0;
    const teamStats= Object.values(gStats).reduce((acc,s)=>{Object.keys(s).forEach(k=>{acc[k]=(acc[k]||0)+s[k];});return acc;},{});
    const qData    = QUARTERS.filter(q=>gQS[q]).map(q=>({q,team:gQS[q]?.team||0,opp:gQS[q]?.opp||0}));
    const scorers  = gPlayers.map(p=>({player:p,pts:gStats[p.id]?calcPoints(gStats[p.id]):0,stats:gStats[p.id]||EMPTY_STATS()})).sort((a,b)=>b.pts-a.pts);

    return (
      <div style={{background:C.bg,minHeight:"100vh",padding:16}}>
        <style>{css}</style>
        <div style={{maxWidth:500,margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
            <button onClick={onBack} style={{background:C.card,color:C.text,padding:"8px 14px",borderRadius:8,fontSize:14,border:`1px solid ${C.border}`}}>← 戻る</button>
            <div style={{fontSize:13,color:C.sub}}>{gInfo.date} {gInfo.tournament}</div>
          </div>

          {/* 最終スコア */}
          <div style={{background:C.card,borderRadius:16,padding:20,marginBottom:12,border:`1px solid ${C.border}`,textAlign:"center"}}>
            <div style={{fontSize:12,color:C.sub,marginBottom:4}}>{gInfo.venue}</div>
            <div style={{fontSize:14,fontWeight:700,marginBottom:12}}>佐野クラブ vs {gInfo.opponent||"相手"}</div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:16}}>
              <div><div style={{fontSize:11,color:C.sub}}>佐野クラブ</div><div className="bebas" style={{fontSize:68,color:tScore>=oScore?C.green:C.text,lineHeight:1}}>{tScore}</div></div>
              <div className="bebas" style={{fontSize:28,color:C.sub}}>-</div>
              <div><div style={{fontSize:11,color:C.sub}}>{gInfo.opponent||"相手"}</div><div className="bebas" style={{fontSize:68,color:oScore>tScore?C.green:C.text,lineHeight:1}}>{oScore}</div></div>
            </div>
            <div style={{marginTop:8,padding:"5px 18px",background:tScore>oScore?C.green+"22":tScore<oScore?C.red+"22":C.opp+"22",borderRadius:20,display:"inline-block",fontSize:14,fontWeight:700,color:tScore>oScore?C.green:tScore<oScore?C.red:C.sub}}>
              {tScore>oScore?"🏆 WIN":tScore<oScore?"😤 LOSE":"🤝 DRAW"}
            </div>
          </div>

          {/* Q別スコア */}
          {qData.length>0&&(
            <div style={{background:C.card,borderRadius:16,padding:16,marginBottom:12,border:`1px solid ${C.border}`}}>
              <div style={{fontSize:11,color:C.accent,fontWeight:700,letterSpacing:2,marginBottom:12}}>Q SCORES</div>
              <div style={{display:"grid",gridTemplateColumns:`repeat(${qData.length+2},1fr)`,gap:4,textAlign:"center"}}>
                <div/>
                {qData.map(d=><div key={d.q} style={{fontSize:11,color:C.sub,fontWeight:700}}>{d.q}</div>)}
                <div style={{fontSize:11,color:C.sub,fontWeight:700}}>計</div>
                <div style={{fontSize:11,fontWeight:700,color:C.green}}>佐野</div>
                {qData.map(d=>{const prev=qData[qData.indexOf(d)-1]?.team||0;return<div key={d.q} style={{fontSize:15,fontWeight:700,color:C.text}}>{d.team-prev}</div>;})}
                <div style={{fontSize:15,fontWeight:900,color:C.green}}>{tScore}</div>
                <div style={{fontSize:11,fontWeight:700,color:C.red}}>{gInfo.opponent||"相手"}</div>
                {qData.map(d=>{const prev=qData[qData.indexOf(d)-1]?.opp||0;return<div key={d.q} style={{fontSize:15,fontWeight:700,color:C.text}}>{d.opp-prev}</div>;})}
                <div style={{fontSize:15,fontWeight:900,color:C.red}}>{oScore}</div>
              </div>
            </div>
          )}

          {/* チームスタッツ */}
          <div style={{background:C.card,borderRadius:16,padding:16,marginBottom:12,border:`1px solid ${C.border}`}}>
            <div style={{fontSize:11,color:C.accent,fontWeight:700,letterSpacing:2,marginBottom:12}}>TEAM STATS</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
              {[["FG",`${teamStats.fg2m+teamStats.fg3m}/${teamStats.fg2a+teamStats.fg3a}`,pct(teamStats.fg2m+teamStats.fg3m,teamStats.fg2a+teamStats.fg3a)],["3P",`${teamStats.fg3m}/${teamStats.fg3a}`,pct(teamStats.fg3m,teamStats.fg3a)],["FT",`${teamStats.ftm}/${teamStats.fta}`,pct(teamStats.ftm,teamStats.fta)],["OR",teamStats.orb||0,""],["DR",teamStats.drb||0,""],["REB",(teamStats.orb||0)+(teamStats.drb||0),""],["AS",teamStats.ast||0,""],["ST",teamStats.stl||0,""],["BLK",teamStats.blk||0,""],["TO",teamStats.tov||0,""],["F",teamStats.pf||0,""]].map(([label,val,sub])=>(
                <div key={label} style={{background:C.card2,borderRadius:8,padding:"10px 8px",textAlign:"center"}}>
                  <div style={{fontSize:10,color:C.sub,marginBottom:2}}>{label}</div>
                  <div style={{fontSize:18,fontWeight:900,color:C.text}}>{val}</div>
                  {sub&&<div style={{fontSize:10,color:C.accent,fontWeight:700}}>{sub}</div>}
                </div>
              ))}
            </div>
          </div>

          {/* 個人スタッツ */}
          <div style={{background:C.card,borderRadius:16,padding:16,marginBottom:12,border:`1px solid ${C.border}`}}>
            <div style={{fontSize:11,color:C.accent,fontWeight:700,letterSpacing:2,marginBottom:12}}>INDIVIDUAL STATS</div>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,minWidth:400}}>
                <thead><tr style={{borderBottom:`1px solid ${C.border}`}}>{["選手","PTS","FG%","3P%","FT%","REB","AS","ST","TO","F"].map(h=><th key={h} style={{padding:"6px 4px",color:C.sub,textAlign:"center",whiteSpace:"nowrap",fontSize:10}}>{h}</th>)}</tr></thead>
                <tbody>
                  {scorers.map(({player:p,pts,stats:s})=>(
                    <tr key={p.id} style={{borderBottom:`1px solid ${C.border}44`}}>
                      <td style={{padding:"8px 4px",whiteSpace:"nowrap"}}><span className="bebas" style={{color:gMC,marginRight:4}}>#{gGetNum(p)}</span><span style={{fontSize:11}}>{p.name}</span></td>
                      <td style={{textAlign:"center",fontWeight:900,color:pts>0?C.text:C.sub}}>{pts}</td>
                      <td style={{textAlign:"center",color:C.sub}}>{pct(s.fg2m+s.fg3m,s.fg2a+s.fg3a)}</td>
                      <td style={{textAlign:"center",color:C.sub}}>{pct(s.fg3m,s.fg3a)}</td>
                      <td style={{textAlign:"center",color:C.sub}}>{pct(s.ftm,s.fta)}</td>
                      <td style={{textAlign:"center"}}>{s.orb+s.drb}</td>
                      <td style={{textAlign:"center"}}>{s.ast}</td>
                      <td style={{textAlign:"center"}}>{s.stl}</td>
                      <td style={{textAlign:"center",color:s.tov>2?C.red:C.sub}}>{s.tov}</td>
                      <td style={{textAlign:"center",color:s.pf>=4?C.red:C.sub}}>{s.pf}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>

          {/* プレイログ */}
          <div style={{background:C.card,borderRadius:16,padding:16,marginBottom:12,border:`1px solid ${C.border}`}}>
            <div style={{fontSize:11,color:C.accent,fontWeight:700,letterSpacing:2,marginBottom:12}}>GAME LOG ({gLog.length}件)</div>
            <div style={{maxHeight:240,overflow:"auto"}}>
              {gLog.map((entry,i)=>(
                <div key={i} style={{display:"flex",gap:8,padding:"5px 0",borderBottom:`1px solid ${C.border}33`,fontSize:13}}>
                  <span style={{color:C.accent,fontWeight:700,minWidth:24}}>{entry.q}</span>
                  <span style={{color:C.sub,minWidth:44}}>{entry.time}</span>
                  <span style={{color:entry.type==="opp"?C.red:C.text}}>{entry.text}</span>
                </div>
              ))}
            </div>
          </div>

          {/* ボタン */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
            <button onClick={onBack} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:14,fontWeight:700,fontSize:14,color:C.text}}>🏠 ホームへ</button>
            <button onClick={()=>{
              const text=`佐野クラブ ${tScore} - ${oScore} ${gInfo.opponent||"相手"}\n${gInfo.date} ${gInfo.tournament}\n\n個人成績\n`+scorers.map(({player:p,pts,stats:s})=>`#${gGetNum(p)}${p.name}: ${pts}pts REB${s.orb+s.drb} AS${s.ast} ST${s.stl} TO${s.tov}`).join("\n");
              navigator.clipboard?.writeText(text);
              alert("📋 コピーしました！");
            }} style={{background:C.accent,border:"none",borderRadius:10,padding:14,fontWeight:700,fontSize:14,color:"#000"}}>📋 結果コピー</button>
          </div>
          {/* HTMLレポートダウンロード */}
          <button onClick={()=>{
            const qRows = qData.map((d,i)=>{
              const prevT=i>0?qData[i-1].team:0; const prevO=i>0?qData[i-1].opp:0;
              return `<tr><td>${d.q}</td><td>${d.team-prevT}</td><td>${d.opp-prevO}</td></tr>`;
            }).join("");
            const playerRows = scorers.map(({player:p,pts,stats:s})=>`
              <tr>
                <td>#${gGetNum(p)} ${p.name}<br><small>${p.grade}</small></td>
                <td><b>${pts}</b></td>
                <td>${pct(s.fg2m+s.fg3m,s.fg2a+s.fg3a)}</td>
                <td>${pct(s.fg3m,s.fg3a)}</td>
                <td>${pct(s.ftm,s.fta)}</td>
                <td>${s.orb+s.drb}</td>
                <td>${s.ast}</td>
                <td>${s.stl}</td>
                <td style="color:${s.tov>2?'#dc2626':'inherit'}">${s.tov}</td>
                <td style="color:${s.pf>=4?'#dc2626':'inherit'}">${s.pf}</td>
              </tr>`).join("");
            const logRows = gLog.map(e=>`<tr><td>${e.q}</td><td>${e.time}</td><td style="color:${e.type==='opp'?'#dc2626':'#0f172a'}">${e.text}</td></tr>`).join("");
            const html=`<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>佐野クラブ vs ${gInfo.opponent||"相手"} ${gInfo.date}</title>
<style>
  body{font-family:'Noto Sans JP',sans-serif;background:#f5f7fa;color:#0f172a;padding:20px;max-width:700px;margin:0 auto;}
  h1{font-size:22px;color:#1a2a4a;margin-bottom:4px;}
  .meta{color:#64748b;font-size:13px;margin-bottom:20px;}
  .score-box{background:#fff;border-radius:14px;padding:20px;margin-bottom:16px;border:1px solid #cbd5e1;text-align:center;}
  .score-main{display:flex;justify-content:center;align-items:center;gap:24px;margin:12px 0;}
  .score-num{font-size:64px;font-weight:900;line-height:1;}
  .score-label{font-size:12px;color:#64748b;}
  .result-badge{display:inline-block;padding:5px 18px;border-radius:20px;font-weight:700;font-size:14px;margin-top:8px;}
  .win{background:#dcfce7;color:#15803d;} .lose{background:#fee2e2;color:#dc2626;} .draw{background:#f1f5f9;color:#64748b;}
  .section{background:#fff;border-radius:12px;padding:16px;margin-bottom:14px;border:1px solid #cbd5e1;}
  .section h2{font-size:13px;color:#d97706;font-weight:700;letter-spacing:2px;margin-bottom:12px;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{background:#1a2a4a;color:#fff;padding:7px 6px;text-align:center;}
  td{padding:7px 6px;text-align:center;border-bottom:1px solid #e2e8f0;}
  tr:nth-child(even){background:#f8fafc;}
  .team-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
  .stat-card{background:#f8fafc;border-radius:8px;padding:10px;text-align:center;}
  .stat-label{font-size:10px;color:#64748b;margin-bottom:3px;}
  .stat-val{font-size:18px;font-weight:900;}
  .stat-sub{font-size:11px;color:#d97706;font-weight:700;}
  .log-row{display:flex;gap:10px;padding:5px 0;border-bottom:1px solid #f1f5f9;font-size:13px;}
  .log-q{color:#d97706;font-weight:700;min-width:24px;}
  .log-t{color:#94a3b8;min-width:44px;}
</style></head><body>
<h1>佐野クラブ 試合レポート</h1>
<div class="meta">${gInfo.date} ${gInfo.tournament} ${gInfo.venue||""}</div>
<div class="score-box">
  <div style="font-size:15px;font-weight:700;">佐野クラブ vs ${gInfo.opponent||"相手"}</div>
  <div class="score-main">
    <div><div class="score-label">佐野クラブ</div><div class="score-num" style="color:${tScore>=oScore?'#15803d':'#0f172a'}">${tScore}</div></div>
    <div style="font-size:28px;color:#94a3b8">-</div>
    <div><div class="score-label">${gInfo.opponent||"相手"}</div><div class="score-num" style="color:${oScore>tScore?'#15803d':'#0f172a'}">${oScore}</div></div>
  </div>
  <span class="result-badge ${tScore>oScore?'win':tScore<oScore?'lose':'draw'}">${tScore>oScore?"🏆 WIN":tScore<oScore?"😤 LOSE":"🤝 DRAW"}</span>
</div>
${qData.length>0?`<div class="section"><h2>Q SCORES</h2><table><thead><tr><th>Q</th><th>佐野</th><th>${gInfo.opponent||"相手"}</th></tr></thead><tbody>${qRows}<tr style="font-weight:900"><td>合計</td><td>${tScore}</td><td>${oScore}</td></tr></tbody></table></div>`:""}
<div class="section"><h2>TEAM STATS</h2><div class="team-grid">
  <div class="stat-card"><div class="stat-label">FG</div><div class="stat-val">${teamStats.fg2m+teamStats.fg3m}/${teamStats.fg2a+teamStats.fg3a}</div><div class="stat-sub">${pct(teamStats.fg2m+teamStats.fg3m,teamStats.fg2a+teamStats.fg3a)}</div></div>
  <div class="stat-card"><div class="stat-label">3P</div><div class="stat-val">${teamStats.fg3m}/${teamStats.fg3a}</div><div class="stat-sub">${pct(teamStats.fg3m,teamStats.fg3a)}</div></div>
  <div class="stat-card"><div class="stat-label">FT</div><div class="stat-val">${teamStats.ftm}/${teamStats.fta}</div><div class="stat-sub">${pct(teamStats.ftm,teamStats.fta)}</div></div>
  <div class="stat-card"><div class="stat-label">REB</div><div class="stat-val">${(teamStats.orb||0)+(teamStats.drb||0)}</div></div>
  <div class="stat-card"><div class="stat-label">AS</div><div class="stat-val">${teamStats.ast||0}</div></div>
  <div class="stat-card"><div class="stat-label">ST</div><div class="stat-val">${teamStats.stl||0}</div></div>
  <div class="stat-card"><div class="stat-label">TO</div><div class="stat-val">${teamStats.tov||0}</div></div>
  <div class="stat-card"><div class="stat-label">BLK</div><div class="stat-val">${teamStats.blk||0}</div></div>
  <div class="stat-card"><div class="stat-label">F</div><div class="stat-val">${teamStats.pf||0}</div></div>
</div></div>
<div class="section"><h2>INDIVIDUAL STATS</h2><table><thead><tr><th>選手</th><th>PTS</th><th>FG%</th><th>3P%</th><th>FT%</th><th>REB</th><th>AS</th><th>ST</th><th>TO</th><th>F</th></tr></thead><tbody>${playerRows}</tbody></table></div>
${gLog.length>0?`<div class="section"><h2>GAME LOG (${gLog.length}件)</h2>${gLog.map(e=>`<div class="log-row"><span class="log-q">${e.q}</span><span class="log-t">${e.time}</span><span style="color:${e.type==='opp'?'#dc2626':'#0f172a'}">${e.text}</span></div>`).join("")}</div>`:""}
<div style="text-align:center;color:#94a3b8;font-size:12px;margin-top:20px;">佐野クラブ男子 Stats App</div>
</body></html>`;
            const blob=new Blob([html],{type:"text/html;charset=utf-8"});
            const url=URL.createObjectURL(blob);
            const a=document.createElement("a");
            a.href=url; a.download=`${gInfo.date}_${gInfo.opponent||"相手"}.html`;
            a.click(); URL.revokeObjectURL(url);
          }} style={{width:"100%",background:C.blue,border:"none",borderRadius:10,padding:14,fontWeight:700,fontSize:14,color:"#fff",marginBottom:24}}>
            💾 HTMLレポートを保存
          </button>
        </div>
      </div>
    );
  };

  // ════════════════════════════════════════
  // サマリー画面（試合直後）
  // ════════════════════════════════════════
  if (screen===SCREENS.SUMMARY) {
    const currentGameData = {
      players: roster.map(id=>players.find(p=>p.id===id)).filter(Boolean),
      stats, oppStats, log, info: gameInfo,
      quarterScores, teamScore, oppScore, numberMode,
    };
    return <SummaryView gameData={currentGameData} onBack={()=>setScreen(SCREENS.SETUP)}/>;
  }

  // ════════════════════════════════════════
  // 試合履歴一覧
  // ════════════════════════════════════════
  if (screen===SCREENS.HISTORY) return (
    <div style={{background:C.bg,minHeight:"100vh",padding:16}}>
      <style>{css}</style>
      <div style={{maxWidth:500,margin:"0 auto"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
          <button onClick={()=>setScreen(SCREENS.SETUP)} style={{background:C.card,color:C.text,padding:"8px 14px",borderRadius:8,fontSize:14,border:`1px solid ${C.border}`}}>← 戻る</button>
          <h2 style={{fontSize:20,fontWeight:900}}>試合履歴</h2>
          <div style={{marginLeft:"auto",fontSize:12,color:C.sub}}>{gameHistory.length}試合</div>
        </div>

        {/* 全削除ボタン */}
        {gameHistory.length>0&&(
          <button onClick={()=>{
            if(window.confirm("全ての試合履歴を削除しますか？\n選手登録データは削除されません。")){
              setGameHistory([]);
            }
          }} style={{width:"100%",background:"none",border:`1px solid ${C.red}`,borderRadius:10,padding:"10px",fontSize:13,fontWeight:700,color:C.red,marginBottom:14}}>
            🗑️ 全履歴を削除
          </button>
        )}

        {gameHistory.length===0?(
          <div style={{textAlign:"center",padding:"60px 20px",color:C.sub}}>
            <div style={{fontSize:40,marginBottom:12}}>📋</div>
            <div style={{fontSize:14}}>まだ試合履歴がありません</div>
          </div>
        ):(
          gameHistory.map(g=>(
            <div key={g.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:"14px 16px",marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
              {/* 試合情報（タップで詳細） */}
              <button onClick={()=>{setSelectedHistory(g);setScreen(SCREENS.HISTORY_DETAIL);}}
                style={{flex:1,display:"flex",justifyContent:"space-between",alignItems:"center",background:"none",textAlign:"left",gap:8}}>
                <div>
                  <div style={{fontSize:15,fontWeight:700,color:C.text}}>vs {g.info.opponent||"不明"}</div>
                  <div style={{fontSize:12,color:C.sub,marginTop:2}}>{g.info.date} {g.info.tournament}</div>
                  {g.info.venue&&<div style={{fontSize:11,color:C.sub}}>{g.info.venue}</div>}
                </div>
                <div style={{textAlign:"right"}}>
                  <div className="bebas" style={{fontSize:28,color:g.teamScore>g.oppScore?C.green:g.teamScore<g.oppScore?C.red:C.sub}}>{g.teamScore} - {g.oppScore}</div>
                  <div style={{fontSize:11,padding:"2px 8px",background:g.teamScore>g.oppScore?C.green+"22":g.teamScore<g.oppScore?C.red+"22":C.opp+"22",borderRadius:10,color:g.teamScore>g.oppScore?C.green:g.teamScore<g.oppScore?C.red:C.sub,fontWeight:700}}>
                    {g.teamScore>g.oppScore?"WIN":g.teamScore<g.oppScore?"LOSE":"DRAW"}
                  </div>
                </div>
              </button>
              {/* 個別削除ボタン */}
              <button onClick={()=>{
                if(window.confirm(`vs ${g.info.opponent||"不明"} (${g.info.date})\nこの試合履歴を削除しますか？`)){
                  setGameHistory(prev=>prev.filter(x=>x.id!==g.id));
                }
              }} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 10px",fontSize:18,color:C.red,flexShrink:0}}>
                🗑️
              </button>
            </div>
          ))
        )}
      </div>
    </div>
  );

  // ════════════════════════════════════════
  // 試合履歴詳細
  // ════════════════════════════════════════
  if (screen===SCREENS.HISTORY_DETAIL && selectedHistory) {
    return <SummaryView gameData={selectedHistory} onBack={()=>setScreen(SCREENS.HISTORY)}/>;
  }

  return null;
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
